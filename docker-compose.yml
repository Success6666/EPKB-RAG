name: enterprise-rag

services:
  mysql:
    image: mysql:8.4
    container_name: rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rag_platform}
      MYSQL_USER: ${MYSQL_USER:-rag_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-net

  redis:
    image: redis:7.4-alpine
    container_name: rag-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rag-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rag_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rag-net

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: rag-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - rag-net

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: rag-chroma
    restart: unless-stopped
    profiles: ["chroma"]
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - rag-net

  springboot:
    image: eclipse-temurin:21-jre
    container_name: rag-springboot
    restart: unless-stopped
    working_dir: /app
    profiles: ["app"]
    command: ["sh", "-c", "java $$JAVA_OPTS -jar /app/app.jar"]
    environment:
      SERVER_PORT: 8080
      SERVER_TOMCAT_THREADS_MAX: ${SERVER_TOMCAT_THREADS_MAX:-64}
      SERVER_TOMCAT_THREADS_MIN_SPARE: ${SERVER_TOMCAT_THREADS_MIN_SPARE:-4}
      SERVER_TOMCAT_ACCEPT_COUNT: ${SERVER_TOMCAT_ACCEPT_COUNT:-50}
      SERVER_TOMCAT_MAX_CONNECTIONS: ${SERVER_TOMCAT_MAX_CONNECTIONS:-256}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-rag_platform}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-rag_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-5}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-1}
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:-30000}
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:-1800000}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-10000}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 0
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-rag_user}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
      SPRING_CLOUD_SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED: "false"
      SA_TOKEN_TOKEN_PREFIX: Bearer
      RABBITMQ_DOCUMENT_EXCHANGE: ${RABBITMQ_DOCUMENT_EXCHANGE:-rag.document.exchange}
      RABBITMQ_DOCUMENT_ROUTING_KEY: ${RABBITMQ_DOCUMENT_ROUTING_KEY:-rag.document.index}
      RABBITMQ_DOCUMENT_QUEUE: ${RABBITMQ_DOCUMENT_QUEUE:-rag.document.ingest}
      RABBITMQ_DOCUMENT_DLX: ${RABBITMQ_DOCUMENT_DLX:-rag.document.dlx}
      RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY: ${RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY:-rag.document.dead}
      RABBITMQ_DOCUMENT_DLQ: ${RABBITMQ_DOCUMENT_DLQ:-rag.document.ingest.dlq}
      RAG_API_BASE_URL: http://fastapi:8000
      RAG_DOCUMENT_ROOT: /data/uploads
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-ollama}
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-qwen2.5:7b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_GENERATION_MODEL:-qwen2.5:7b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JAVA_CALLBACK_TOKEN: ${JAVA_CALLBACK_TOKEN:?Set JAVA_CALLBACK_TOKEN in .env}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      RAG_ASYNC_CHAT_STREAM_CORE_POOL_SIZE: ${RAG_ASYNC_CHAT_STREAM_CORE_POOL_SIZE:-2}
      RAG_ASYNC_CHAT_STREAM_MAX_POOL_SIZE: ${RAG_ASYNC_CHAT_STREAM_MAX_POOL_SIZE:-8}
      RAG_ASYNC_CHAT_STREAM_QUEUE_CAPACITY: ${RAG_ASYNC_CHAT_STREAM_QUEUE_CAPACITY:-100}
      JAVA_OPTS: "${JAVA_OPTS:--Xms128m -Xmx384m -XX:+UseContainerSupport -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=30 -XX:+UseStringDeduplication -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/urandom}"
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${SPRINGBOOT_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "grep -qi ':1F90 .* 0A ' /proc/net/tcp || { test -r /proc/net/tcp6 && grep -qi ':1F90 .* 0A ' /proc/net/tcp6; }"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ${SPRINGBOOT_JAR:-./SpringBoot/target/app.jar}:/app/app.jar:ro
      - shared_uploads:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - rag-net

  fastapi:
    build:
      context: ./FastApi
    container_name: rag-fastapi
    restart: unless-stopped
    working_dir: /app
    profiles: ["app"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "${FASTAPI_WORKERS:-1}", "--timeout-keep-alive", "${FASTAPI_TIMEOUT_KEEP_ALIVE:-20}"]
    environment:
      APP_ENV: ${APP_ENV:-prod}
      PYTHONUNBUFFERED: "1"
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-1}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-1}
      VECLIB_MAXIMUM_THREADS: ${VECLIB_MAXIMUM_THREADS:-1}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      RUNTIME_GC_ENABLED: ${RUNTIME_GC_ENABLED:-true}
      RUNTIME_GC_INTERVAL_SECONDS: ${RUNTIME_GC_INTERVAL_SECONDS:-300}
      RUNTIME_MALLOC_TRIM_ENABLED: ${RUNTIME_MALLOC_TRIM_ENABLED:-true}
      RUNTIME_GC_LOG_ENABLED: ${RUNTIME_GC_LOG_ENABLED:-false}
      MYSQL_DSN: ${MYSQL_DSN:?Set MYSQL_DSN in .env}
      JAVA_CALLBACK_BASE_URL: http://springboot:8080
      JAVA_CALLBACK_TOKEN: ${JAVA_CALLBACK_TOKEN:?Set JAVA_CALLBACK_TOKEN in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rag_user}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_DOCUMENT_QUEUE:-rag.document.ingest}
      RABBITMQ_DOCUMENT_EXCHANGE: ${RABBITMQ_DOCUMENT_EXCHANGE:-rag.document.exchange}
      RABBITMQ_DOCUMENT_ROUTING_KEY: ${RABBITMQ_DOCUMENT_ROUTING_KEY:-rag.document.index}
      RABBITMQ_DOCUMENT_DLX: ${RABBITMQ_DOCUMENT_DLX:-rag.document.dlx}
      RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY: ${RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY:-rag.document.dead}
      RABBITMQ_DOCUMENT_DLQ: ${RABBITMQ_DOCUMENT_DLQ:-rag.document.ingest.dlq}
      VECTOR_STORE: ${VECTOR_STORE:-milvus}
      MILVUS_URI: http://milvus:19530
      MILVUS_METRIC_TYPE: ${MILVUS_METRIC_TYPE:-L2}
      MILVUS_INDEX_TYPE: ${MILVUS_INDEX_TYPE:-HNSW}
      MILVUS_HNSW_M: ${MILVUS_HNSW_M:-16}
      MILVUS_HNSW_EF_CONSTRUCTION: ${MILVUS_HNSW_EF_CONSTRUCTION:-200}
      MILVUS_SEARCH_EF: ${MILVUS_SEARCH_EF:-128}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-ollama}
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-qwen2.5:7b}
      DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-nvidia}
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-qwen2.5:7b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_EMBEDDING_MODEL: ${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      NVIDIA_EMBEDDING_TRUNCATE: ${NVIDIA_EMBEDDING_TRUNCATE:-NONE}
      NVIDIA_EMBEDDING_ENCODING_FORMAT: ${NVIDIA_EMBEDDING_ENCODING_FORMAT:-float}
      NVIDIA_EMBEDDING_BATCH_SIZE: ${NVIDIA_EMBEDDING_BATCH_SIZE:-64}
      NVIDIA_EMBEDDING_MAX_CONCURRENCY: ${NVIDIA_EMBEDDING_MAX_CONCURRENCY:-2}
      NVIDIA_EMBEDDING_MAX_RETRIES: ${NVIDIA_EMBEDDING_MAX_RETRIES:-4}
      NVIDIA_EMBEDDING_RETRY_BACKOFF_SECONDS: ${NVIDIA_EMBEDDING_RETRY_BACKOFF_SECONDS:-1.0}
      NVIDIA_EMBEDDING_RETRY_MAX_BACKOFF_SECONDS: ${NVIDIA_EMBEDDING_RETRY_MAX_BACKOFF_SECONDS:-12.0}
      MYSQL_INGEST_INSERT_BATCH_SIZE: ${MYSQL_INGEST_INSERT_BATCH_SIZE:-500}
      VECTOR_UPSERT_BATCH_SIZE: ${VECTOR_UPSERT_BATCH_SIZE:-256}
      FULL_DOCUMENT_CONTEXT_ENABLED: ${FULL_DOCUMENT_CONTEXT_ENABLED:-true}
      FULL_DOCUMENT_CONTEXT_MAX_DOCS: ${FULL_DOCUMENT_CONTEXT_MAX_DOCS:-2}
      FULL_DOCUMENT_CONTEXT_MAX_CHARS: ${FULL_DOCUMENT_CONTEXT_MAX_CHARS:-24000}
      FULL_DOCUMENT_CONTEXT_MIN_SCORE: ${FULL_DOCUMENT_CONTEXT_MIN_SCORE:-0.15}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-deepseek}
      RERANK_MODEL: ${RERANK_MODEL:-deepseek-v4-flash}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://api.deepseek.com}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FASTAPI_BIND_HOST:-127.0.0.1}:${FASTAPI_PORT:-8000}:8000"
    volumes:
      - ./FastApi:/app
      - shared_uploads:/data/uploads
      - fastapi_cache:/root/.cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - rag-net

  fastapi-worker:
    build:
      context: ./FastApi
    container_name: rag-fastapi-worker
    restart: unless-stopped
    working_dir: /app
    profiles: ["app"]
    command: ["python", "-m", "app.workers.rabbitmq_consumer"]
    environment:
      APP_ENV: ${APP_ENV:-prod}
      PYTHONUNBUFFERED: "1"
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-1}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-1}
      VECLIB_MAXIMUM_THREADS: ${VECLIB_MAXIMUM_THREADS:-1}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
      RUNTIME_GC_ENABLED: ${RUNTIME_GC_ENABLED:-true}
      RUNTIME_GC_INTERVAL_SECONDS: ${RUNTIME_GC_INTERVAL_SECONDS:-300}
      RUNTIME_MALLOC_TRIM_ENABLED: ${RUNTIME_MALLOC_TRIM_ENABLED:-true}
      RUNTIME_GC_LOG_ENABLED: ${RUNTIME_GC_LOG_ENABLED:-false}
      MYSQL_DSN: ${MYSQL_DSN:?Set MYSQL_DSN in .env}
      JAVA_CALLBACK_BASE_URL: http://springboot:8080
      JAVA_CALLBACK_TOKEN: ${JAVA_CALLBACK_TOKEN:?Set JAVA_CALLBACK_TOKEN in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rag_user}:${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      RABBITMQ_QUEUE: ${RABBITMQ_DOCUMENT_QUEUE:-rag.document.ingest}
      RABBITMQ_DOCUMENT_EXCHANGE: ${RABBITMQ_DOCUMENT_EXCHANGE:-rag.document.exchange}
      RABBITMQ_DOCUMENT_ROUTING_KEY: ${RABBITMQ_DOCUMENT_ROUTING_KEY:-rag.document.index}
      RABBITMQ_DOCUMENT_DLX: ${RABBITMQ_DOCUMENT_DLX:-rag.document.dlx}
      RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY: ${RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY:-rag.document.dead}
      RABBITMQ_DOCUMENT_DLQ: ${RABBITMQ_DOCUMENT_DLQ:-rag.document.ingest.dlq}
      RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT:-1}
      RABBITMQ_MAX_RETRIES: ${RABBITMQ_MAX_RETRIES:-3}
      RAG_INGEST_CONCURRENCY: ${RAG_INGEST_CONCURRENCY:-1}
      VECTOR_STORE: ${VECTOR_STORE:-milvus}
      MILVUS_URI: http://milvus:19530
      MILVUS_METRIC_TYPE: ${MILVUS_METRIC_TYPE:-L2}
      MILVUS_INDEX_TYPE: ${MILVUS_INDEX_TYPE:-HNSW}
      MILVUS_HNSW_M: ${MILVUS_HNSW_M:-16}
      MILVUS_HNSW_EF_CONSTRUCTION: ${MILVUS_HNSW_EF_CONSTRUCTION:-200}
      MILVUS_SEARCH_EF: ${MILVUS_SEARCH_EF:-128}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-ollama}
      DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-nvidia}
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-qwen2.5:7b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_EMBEDDING_MODEL: ${NVIDIA_EMBEDDING_MODEL:-nvidia/nv-embedqa-e5-v5}
      NVIDIA_EMBEDDING_TRUNCATE: ${NVIDIA_EMBEDDING_TRUNCATE:-NONE}
      NVIDIA_EMBEDDING_ENCODING_FORMAT: ${NVIDIA_EMBEDDING_ENCODING_FORMAT:-float}
      NVIDIA_EMBEDDING_BATCH_SIZE: ${NVIDIA_EMBEDDING_BATCH_SIZE:-64}
      NVIDIA_EMBEDDING_MAX_CONCURRENCY: ${NVIDIA_EMBEDDING_MAX_CONCURRENCY:-2}
      NVIDIA_EMBEDDING_MAX_RETRIES: ${NVIDIA_EMBEDDING_MAX_RETRIES:-4}
      NVIDIA_EMBEDDING_RETRY_BACKOFF_SECONDS: ${NVIDIA_EMBEDDING_RETRY_BACKOFF_SECONDS:-1.0}
      NVIDIA_EMBEDDING_RETRY_MAX_BACKOFF_SECONDS: ${NVIDIA_EMBEDDING_RETRY_MAX_BACKOFF_SECONDS:-12.0}
      MYSQL_INGEST_INSERT_BATCH_SIZE: ${MYSQL_INGEST_INSERT_BATCH_SIZE:-500}
      VECTOR_UPSERT_BATCH_SIZE: ${VECTOR_UPSERT_BATCH_SIZE:-256}
      FULL_DOCUMENT_CONTEXT_ENABLED: ${FULL_DOCUMENT_CONTEXT_ENABLED:-true}
      FULL_DOCUMENT_CONTEXT_MAX_DOCS: ${FULL_DOCUMENT_CONTEXT_MAX_DOCS:-2}
      FULL_DOCUMENT_CONTEXT_MAX_CHARS: ${FULL_DOCUMENT_CONTEXT_MAX_CHARS:-24000}
      FULL_DOCUMENT_CONTEXT_MIN_SCORE: ${FULL_DOCUMENT_CONTEXT_MIN_SCORE:-0.15}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-deepseek}
      RERANK_MODEL: ${RERANK_MODEL:-deepseek-v4-flash}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://api.deepseek.com}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./FastApi:/app
      - shared_uploads:/data/uploads
      - fastapi_cache:/root/.cache
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus:
        condition: service_healthy
      springboot:
        condition: service_healthy
    networks:
      - rag-net

  frontend:
    build:
      context: ./frontend
    container_name: rag-frontend
    restart: unless-stopped
    profiles: ["app"]
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - springboot
      - fastapi
    networks:
      - rag-net

