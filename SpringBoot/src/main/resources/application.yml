server:
  port: 8080
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:64}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:4}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:50}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:256}

spring:
  application:
    name: enterprise-rag-platform
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rag_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:rag_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: ${SPRING_AI_MODEL_EMBEDDING:none}
      image: ${SPRING_AI_MODEL_IMAGE:none}
      audio:
        speech: ${SPRING_AI_MODEL_AUDIO_SPEECH:none}
        transcription: ${SPRING_AI_MODEL_AUDIO_TRANSCRIPTION:none}
      moderation: ${SPRING_AI_MODEL_MODERATION:none}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5:7b}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-body: false
  is-read-cookie: false

resilience4j:
  circuitbreaker:
    instances:
      chatModel:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      chatModel:
        limit-for-period: 30
        limit-refresh-period: 1m
        timeout-duration: 0

rag:
  storage:
    document-root: ${RAG_DOCUMENT_ROOT:E:/AI/SpringBoot/storage/documents}
  rabbitmq:
    document-exchange: ${RABBITMQ_DOCUMENT_EXCHANGE:rag.document.exchange}
    document-routing-key: ${RABBITMQ_DOCUMENT_ROUTING_KEY:rag.document.index}
    document-index-queue: ${RABBITMQ_DOCUMENT_QUEUE:rag.document.ingest}
    document-dead-letter-exchange: ${RABBITMQ_DOCUMENT_DLX:rag.document.dlx}
    document-dead-letter-routing-key: ${RABBITMQ_DOCUMENT_DLQ_ROUTING_KEY:rag.document.dead}
    document-dead-letter-queue: ${RABBITMQ_DOCUMENT_DLQ:rag.document.ingest.dlq}
  model:
    provider: ${RAG_MODEL_PROVIDER:${GENERATION_PROVIDER:ollama}}
    cloud-provider: openai
    local-provider: ollama
    ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    ollama-model: ${OLLAMA_MODEL:qwen2.5:7b}
    open-ai-base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    open-ai-api-key: ${OPENAI_API_KEY:}
    open-ai-model: ${OPENAI_MODEL:gpt-4o-mini}
    temperature: ${MODEL_TEMPERATURE:0.2}
    top-p: ${MODEL_TOP_P:0.8}
    max-tokens: ${MODEL_MAX_TOKENS:2048}
  retrieval:
    default-top-k: 5
    default-mode: hybrid
  chat:
    context-window-tokens: ${CHAT_CONTEXT_WINDOW_TOKENS:262144}
    compression-trigger-tokens: ${CHAT_CONTEXT_COMPRESSION_TRIGGER_TOKENS:200000}
    retrieval-reserve-tokens: ${CHAT_RETRIEVAL_RESERVE_TOKENS:16000}
    summary-reserve-tokens: ${CHAT_SUMMARY_RESERVE_TOKENS:12000}
  tenant:
    header-name: X-Tenant-Id
    group-header-name: X-Group-Id
  rate-limit:
    chat-per-minute: 30
    upload-per-minute: 20
  rag-api:
    base-url: ${RAG_API_BASE_URL:http://localhost:8000}
  langchain4j:
    enabled: ${LANGCHAIN4J_ENABLED:true}
    provider: ${LANGCHAIN4J_PROVIDER:${RAG_MODEL_PROVIDER:${GENERATION_PROVIDER:ollama}}}
    base-url: ${LANGCHAIN4J_BASE_URL:}
    api-key: ${LANGCHAIN4J_API_KEY:${OPENAI_API_KEY:}}
    openai-base-url: ${LANGCHAIN4J_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com/v1}}
    openai-model: ${LANGCHAIN4J_OPENAI_MODEL:${OPENAI_MODEL:gpt-4o-mini}}
    deepseek-base-url: ${LANGCHAIN4J_DEEPSEEK_BASE_URL:${DEEPSEEK_BASE_URL:https://api.deepseek.com}}
    deepseek-api-key: ${LANGCHAIN4J_DEEPSEEK_API_KEY:${DEEPSEEK_API_KEY:}}
    deepseek-model: ${LANGCHAIN4J_DEEPSEEK_MODEL:${DEEPSEEK_MODEL:deepseek-v4-pro}}
    ollama-base-url: ${LANGCHAIN4J_OLLAMA_BASE_URL:${OLLAMA_BASE_URL:http://localhost:11434}}
    ollama-model: ${LANGCHAIN4J_OLLAMA_MODEL:${OLLAMA_MODEL:qwen2.5:7b}}
    timeout: ${LANGCHAIN4J_TIMEOUT:120s}
    max-retries: ${LANGCHAIN4J_MAX_RETRIES:1}
  internal:
    callback-token: ${JAVA_CALLBACK_TOKEN:}
  schema-compat-initializer:
    enabled: ${RAG_SCHEMA_COMPAT_INITIALIZER_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}
